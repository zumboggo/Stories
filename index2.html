<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Drilling Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme Variables */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --highlight: #fbbf24; /* Amber for Karaoke */
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 900px;
            width: 100%;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }

        /* --- Setup Screen --- */
        .setup-screen { text-align: center; }
        
        h1 { font-size: 2.5rem; margin-bottom: 10px; letter-spacing: -0.03em; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-sub); margin-bottom: 40px; font-size: 1.1rem; }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            text-align: left;
            margin-bottom: 30px;
        }

        .full-width { grid-column: span 2; }

        .option-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-main);
            transition: border 0.2s;
        }

        select:focus { outline: none; border-color: var(--primary); }

        /* Book Library */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .book-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.03);
            text-align: left;
        }

        .book-card:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); transform: translateY(-2px); }
        .book-card.selected { background: rgba(59, 130, 246, 0.2); border-color: var(--primary); }
        
        .book-icon { font-size: 1.5rem; margin-bottom: 8px; display: block; }
        .book-title { font-weight: 600; font-size: 0.95rem; color: var(--text-main); }
        .book-status { font-size: 0.8rem; color: var(--text-sub); margin-top: 4px; }

        /* Toggles */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- Study Screen --- */
        .study-screen { display: none; flex-direction: column; align-items: center; }
        
        .progress-container {
            width: 100%;
            margin-bottom: 30px;
        }
        .progress-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* Sentence Display & Karaoke */
        .sentence-box {
            margin: 20px 0;
            width: 100%;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .target-text {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
            transition: all 0.2s;
        }

        /* Karaoke Highlighting Styles */
        .char-span {
            transition: color 0.1s;
            opacity: 0.8;
        }
        .char-span.active {
            color: var(--highlight);
            opacity: 1;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
            transform: scale(1.05);
            display: inline-block;
        }

        .english-text {
            font-size: 1.5rem;
            color: var(--text-sub);
            text-align: center;
            font-style: italic;
        }

        /* Controls */
        .controls-area {
            width: 100%;
            margin-top: 30px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .main-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-primary { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); 
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        .btn-secondary { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); 
            color: var(--text-main); 
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: var(--text-sub); }

        .skip-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 0 auto 20px auto;
        }

        .btn-skip {
            background: rgba(255,255,255,0.03);
            color: var(--text-sub);
            font-size: 0.9rem;
            padding: 8px;
            justify-content: center;
            border: 1px solid var(--border);
        }
        .btn-skip:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }

        .repetition-badge {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: inline-block;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        @media (max-width: 768px) {
            .grid-options { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .target-text { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- SETUP SCREEN -->
    <div id="setupScreen" class="setup-screen">
        <h1>Sentence Drilling Pro</h1>
        <p class="subtitle">Master languages through immersion</p>

        <div class="grid-options">
            <!-- Language -->
            <div class="option-group full-width">
                <label>Target Language</label>
                <select id="targetLanguage">
                    <option value="zh-CN">Chinese (Simplified)</option>
                    <option value="zh-TW">Chinese (Traditional)</option>
                    <option value="ja-JP">Japanese</option>
                    <option value="ko-KR">Korean</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                </select>
            </div>

            <!-- Book Selection -->
            <div class="option-group full-width">
                <label>Select Text</label>
                <div id="libraryGrid" class="library-grid">
                    <!-- Populated by JS -->
                </div>
                <div style="margin-top: 15px; text-align: center; color: var(--text-sub); font-size: 0.9rem;">
                    — or upload custom .txt —
                </div>
                <input type="file" id="fileUpload" accept=".txt" style="margin-top: 10px; width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; color: white; border: 1px solid var(--border);">
            </div>

            <!-- Settings Column 1 -->
            <div class="option-group">
                <label>Repetitions</label>
                <select id="repetitionsSelect">
                    <option value="1">1 Time</option>
                    <option value="2">2 Times</option>
                    <option value="3" selected>3 Times</option>
                    <option value="4">4 Times</option>
                </select>
            </div>

            <!-- Settings Column 2 -->
            <div class="option-group">
                <label>Start Position</label>
                <select id="startPosition">
                    <option value="beginning">Beginning</option>
                    <option value="continue">Continue Last Session</option>
                </select>
            </div>

            <!-- Toggles -->
            <div class="option-group full-width">
                <div class="toggle-row">
                    <span>Auto-Advance Sentences</span>
                    <label class="switch">
                        <input type="checkbox" id="autoAdvanceToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-row">
                    <span>Show English Translation</span>
                    <label class="switch">
                        <input type="checkbox" id="showEnglishToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <button class="btn btn-primary" style="width: 100%; justify-content: center; padding: 16px; font-size: 1.1rem;" onclick="startSession()">
            Start Learning <i class="fas fa-arrow-right"></i>
        </button>
    </div>

    <!-- STUDY SCREEN -->
    <div id="studyScreen" class="study-screen">
        <div class="progress-container">
            <div class="progress-bar-bg">
                <div id="progressFill" class="progress-bar-fill"></div>
            </div>
            <div class="progress-text">
                <span id="progressLabel">Sentence 1 / 100</span>
                <span id="bookLabel">Monkey King</span>
            </div>
        </div>

        <div class="repetition-badge" id="repBadge">Repetition 1 of 3</div>

        <div class="sentence-box">
            <!-- Target Text with Karaoke Spans -->
            <div id="targetText" class="target-text"></div>
            <div id="englishText" class="english-text"></div>
        </div>

        <div class="controls-area">
            <div class="main-controls">
                <button class="btn btn-secondary" onclick="prevSentence()"><i class="fas fa-chevron-left"></i></button>
                <button id="playBtn" class="btn btn-primary" onclick="togglePlay()">
                    <i class="fas fa-play"></i> Play
                </button>
                <button class="btn btn-secondary" onclick="nextSentence()"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="skip-grid">
                <button class="btn btn-skip" onclick="skipAhead(5)">Skip 5</button>
                <button class="btn btn-skip" onclick="skipAhead(10)">Skip 10</button>
                <button class="btn btn-skip" onclick="skipAhead(15)">Skip 15</button>
            </div>

            <button class="btn btn-secondary" style="width: 100%; justify-content: center; margin-top: 10px; color: #ef4444; border-color: rgba(239, 68, 68, 0.3);" onclick="stopSession()">
                Stop & Save
            </button>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const bookLibrary = [
        { id: 'monkey', name: 'Monkey King', icon: '🐒', file: null, builtin: true },
        { id: 'john', name: 'Gospel of John', icon: '📖', file: 'John.txt' },
        { id: 'short', name: 'Short Stories', icon: '📚', file: 'ShortStories.txt' },
        { id: 'moonlight', name: 'Moonlight Sculptor', icon: '⚔️', file: 'Legendary_Moonlight_Sculptor_Vol02_cleaned.txt' }
    ];

    // --- STATE ---
    let sentences = [];
    let currentIndex = 0;
    let currentRep = 1;
    let maxReps = 3;
    let isPlaying = false;
    let autoAdvance = true;
    let showEnglish = true;
    let currentBookId = null;
    let synth = window.speechSynthesis;
    let voices = [];
    let currentUtterance = null;

    // --- INITIALIZATION ---
    function init() {
        voices = synth.getVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => { voices = synth.getVoices(); };
        }

        const grid = document.getElementById('libraryGrid');
        grid.innerHTML = '';
        bookLibrary.forEach(book => {
            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = () => selectBook(book.id, card);
            card.innerHTML = `
                <span class="book-icon">${book.icon}</span>
                <div class="book-title">${book.name}</div>
                <div class="book-status">${book.builtin ? 'Built-in' : 'Click to Load'}</div>
            `;
            grid.appendChild(card);
        });

        document.getElementById('startPosition').addEventListener('change', (e) => {
            if(e.target.value === 'continue') {
                const saved = localStorage.getItem('drill_progress');
                if(saved) {
                    const data = JSON.parse(saved);
                    const book = bookLibrary.find(b => b.id === data.bookId);
                    if(book) selectBook(book.id, document.querySelector(`.book-card[onclick*="${book.id}"]`));
                }
            }
        });
    }

    // --- BOOK LOADING LOGIC ---
    async function selectBook(id, cardElement) {
        document.querySelectorAll('.book-card').forEach(c => c.classList.remove('selected'));
        if(cardElement) cardElement.classList.add('selected');
        currentBookId = id;

        const book = bookLibrary.find(b => b.id === id);
        
        if (book.builtin) {
            sentences = getMonkeyKingData(); 
            finishLoading(book.name);
        } else {
            if(cardElement) cardElement.querySelector('.book-status').textContent = 'Loading...';
            try {
                const response = await fetch(book.file);
                if (!response.ok) throw new Error('File not found');
                const text = await response.text();
                sentences = parseDiglot(text);
                finishLoading(book.name);
            } catch (err) {
                alert(`Error loading ${book.name}: ${err.message}. Ensure file is in same folder.`);
                if(cardElement) cardElement.querySelector('.book-status').textContent = 'Error';
            }
        }
    }

    function finishLoading(name) {
        document.getElementById('bookLabel').textContent = name;
        if(document.getElementById('startPosition').value === 'beginning') {
            currentIndex = 0;
        } else {
            const saved = localStorage.getItem('drill_progress');
            if(saved) {
                const data = JSON.parse(saved);
                if(data.bookId === currentBookId) currentIndex = data.index;
                else currentIndex = 0;
            }
        }
    }

    function parseDiglot(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        const pairs = [];
        for (let i = 0; i < lines.length - 1; i++) {
            const line1 = lines[i];
            const line2 = lines[i+1];
            if (hasChinese(line1) && !hasChinese(line2)) {
                pairs.push({ target: line1, english: line2 });
                i++; 
            }
        }
        return pairs;
    }

    function hasChinese(str) {
        return /[\u4e00-\u9fa5]/.test(str);
    }

    // --- SESSION CONTROL ---
    function startSession() {
        if (sentences.length === 0) {
            alert("Please select a book first!");
            return;
        }

        maxReps = parseInt(document.getElementById('repetitionsSelect').value);
        autoAdvance = document.getElementById('autoAdvanceToggle').checked;
        showEnglish = document.getElementById('showEnglishToggle').checked;

        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('studyScreen').style.display = 'flex';
        
        updateDisplay();
        
        if(autoAdvance) {
            togglePlay();
        }
    }

    function stopSession() {
        synth.cancel();
        isPlaying = false;
        updatePlayButton();
        
        localStorage.setItem('drill_progress', JSON.stringify({
            bookId: currentBookId,
            index: currentIndex
        }));

        document.getElementById('studyScreen').style.display = 'none';
        document.getElementById('setupScreen').style.display = 'block';
    }

    // --- DISPLAY & KARAOKE ---
    function updateDisplay() {
        if (currentIndex >= sentences.length) {
            alert("Book Complete! Great job.");
            stopSession();
            return;
        }

        const pair = sentences[currentIndex];
        const targetEl = document.getElementById('targetText');
        const englishEl = document.getElementById('englishText');

        // Split text into spans for highlighting
        targetEl.innerHTML = '';
        pair.target.split('').forEach((char, index) => {
            const span = document.createElement('span');
            span.textContent = char;
            span.className = 'char-span';
            span.dataset.index = index;
            targetEl.appendChild(span);
        });

        englishEl.textContent = pair.english;
        englishEl.style.display = showEnglish ? 'block' : 'none';

        const pct = ((currentIndex) / sentences.length) * 100;
        document.getElementById('progressFill').style.width = `${pct}%`;
        document.getElementById('progressLabel').textContent = `Sentence ${currentIndex + 1} / ${sentences.length}`;
        
        updateRepBadge();
    }

    function updateRepBadge() {
        document.getElementById('repBadge').textContent = `Repetition ${currentRep} of ${maxReps}`;
    }

    function highlightChar(charIndex) {
        const spans = document.querySelectorAll('.char-span');
        spans.forEach(s => s.classList.remove('active'));
        
        // Safety check for index
        if (charIndex >= 0 && charIndex < spans.length) {
            spans[charIndex].classList.add('active');
        } else {
            // Fallback visual if index is invalid (browser limitation)
            targetEl.style.textShadow = "0 0 20px rgba(251, 191, 36, 0.5)";
            setTimeout(() => targetEl.style.textShadow = "none", 200);
        }
    }

    // --- AUDIO & PLAYBACK ---
    function togglePlay() {
        if (isPlaying) {
            synth.cancel();
            isPlaying = false;
        } else {
            isPlaying = true;
            playCurrentSentence();
        }
        updatePlayButton();
    }

    function updatePlayButton() {
        const btn = document.getElementById('playBtn');
        btn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i> Pause' : '<i class="fas fa-play"></i> Play';
    }

    function playCurrentSentence() {
        if (!isPlaying) return;

        const pair = sentences[currentIndex];
        currentUtterance = new SpeechSynthesisUtterance(pair.target);
        
        const lang = document.getElementById('targetLanguage').value;
        currentUtterance.lang = lang;
        
        const voice = voices.find(v => v.lang.includes(lang.split('-')[0]));
        if (voice) currentUtterance.voice = voice;

        // KARAOKE EVENT
        currentUtterance.onboundary = (event) => {
            // event.charIndex is the character position in the string
            console.log("Boundary event:", event.charIndex); 
            highlightChar(event.charIndex);
        };

        currentUtterance.onend = () => {
            document.querySelectorAll('.char-span').forEach(s => s.classList.remove('active'));
            handleSentenceEnd();
        };

        synth.speak(currentUtterance);
    }

    function handleSentenceEnd() {
        if (!isPlaying) return;

        if (currentRep < maxReps) {
            currentRep++;
            updateRepBadge();
            setTimeout(() => {
                if(isPlaying) playCurrentSentence();
            }, 800);
        } else {
            if (autoAdvance) {
                setTimeout(() => {
                    nextSentence();
                    if(isPlaying) playCurrentSentence();
                }, 1000);
            } else {
                isPlaying = false;
                updatePlayButton();
            }
        }
    }

    // --- NAVIGATION ---
    function nextSentence() {
        if (currentIndex < sentences.length - 1) {
            currentIndex++;
            currentRep = 1;
            updateDisplay();
        }
    }

    function prevSentence() {
        if (currentIndex > 0) {
            currentIndex--;
            currentRep = 1;
            updateDisplay();
        }
    }

    function skipAhead(count) {
        const newIndex = Math.min(currentIndex + count, sentences.length - 1);
        if (newIndex !== currentIndex) {
            currentIndex = newIndex;
            currentRep = 1;
            updateDisplay();
            if (isPlaying) {
                synth.cancel();
                setTimeout(() => playCurrentSentence(), 500);
            }
        }
    }

    function getMonkeyKingData() {
        return [
            { target: "猴王的诞生 我亲爱的孩子，我知道时间很晚了。", english: "The Rise of the Monkey King. My dear child, I know that the hour is late." },
            { target: "你玩了一天，累了，现在是睡觉的时候了。", english: "You've been playing all day and you are tired, and now it is bedtime." },
            { target: "但是你说你想在睡觉前听一个故事。", english: "But you say you want to hear a story before you sleep." },
            { target: "所以现在我给你讲一个很老的关于猴子的故事。", english: "So now I will tell you an old story about a monkey." },
            { target: "这只猴子很强大，也很聪明，但是有的时候他也很淘气。", english: "He was very strong and very smart, but sometimes he was also very naughty." },
            { target: "他需要去学习什么是爱，去学习怎么去帮助别人。", english: "He needed to learn about love and helping others." },
            { target: "几千年以前这只猴子生活在中国的北方。", english: "This monkey lived a thousand years ago in northern China." },
            { target: "在他很长的一生中他有很多名字，但是他最有名的名字是孙悟空。", english: "He had many names during his long life, but most people know him as Sun Wukong." },
            { target: "人们讲了很多关于孙悟空的故事。", english: "People tell many stories about Sun Wukong." },
            { target: "如果我告诉你所有这些故事，需要讲很多天！", english: "If I told you all those stories, I would have to talk for many days!" }
        ];
    }

    init();
</script>
</body>
</html>
```
